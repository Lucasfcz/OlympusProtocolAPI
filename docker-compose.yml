services:
  postgres:
    image: postgres:16
    container_name: olympus-db
    environment:
      POSTGRES_DB: ${DB_NAME:-olympus}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
      POSTGRES_INITDB_ARGS: -c shared_buffers=256MB -c max_connections=200
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - olympus_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - olympus-network

  app:
    build: .
    container_name: olympus-app
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-olympus}
      DB_username: ${DB_USER:-postgres}
      DB_password: ${DB_PASSWORD:?Database password required}
      JWT_secret: ${JWT_SECRET:?JWT secret required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - olympus-network

volumes:
  olympus_data:

networks:
  olympus-network: