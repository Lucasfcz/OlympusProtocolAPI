services:
  redis:
    image: redis:8
    ports:
      - "6379:6379"
    networks:
      - olympus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: olympus-app
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - olympus-network

networks:
  olympus-network: